name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  changes:
    name: Detect Changed Blocks
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      store: ${{ steps.filter.outputs.store }}
      tauri: ${{ steps.filter.outputs.tauri }}
      ci: ${{ steps.filter.outputs.ci }}
      any: ${{ steps.filter.outputs.any }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect path changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'tests/backend/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'alembic.ini'
              - '_dashboard.yaml'
            frontend:
              - 'frontend/**'
              - 'tests/frontend/**'
            store:
              - 'store/**'
              - 'tests/store/**'
              - 'pyproject.toml'
              - 'uv.lock'
            tauri:
              - 'tauri/**'
              - 'scripts/**'
            ci:
              - '.github/workflows/**'
              - '.pre-commit-config.yaml'
            any:
              - '**/*'

  repo-hygiene:
    name: Repo Hygiene & Secrets
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.any == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure local env file is not tracked
        run: |
          if git ls-files --error-unmatch .env >/dev/null 2>&1; then
            echo "::error file=.env::.env is tracked in Git. Keep secrets in local-only .env and commit only .env.example."
            exit 1
          fi

      - name: Scan git history for leaked secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  backend-quality:
    name: Backend - Linters & Tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.ci == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: latest
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Ruff check
        run: uv run --group dev ruff check backend tests/backend

      - name: Ruff format check
        run: uv run --group dev ruff format --check backend tests/backend

      - name: Mypy
        run: uv run --group dev mypy

      - name: Pytest (backend)
        run: uv run --group dev pytest tests/backend --cov=backend --cov-report=term-missing --cov-fail-under=90

  frontend-quality:
    name: Frontend - Linters & Tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.ci == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: ESLint
        run: cd frontend && npm run lint

      - name: Typecheck
        run: cd frontend && npm run typecheck

      - name: Frontend tests
        run: cd frontend && npm run test

  store-quality:
    name: Store - Linters & Tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.store == 'true' || needs.changes.outputs.ci == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: latest
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Ruff check (store)
        run: uv run --group dev ruff check store tests/store

      - name: Ruff format check (store)
        run: uv run --group dev ruff format --check store tests/store

      - name: Pytest (store)
        run: PYTHONPATH=. uv run --group dev pytest --override-ini=addopts= tests/store

  precommit:
    name: Pre-commit (manual stage)
    runs-on: ubuntu-latest
    needs: changes
    if: |
      needs.changes.outputs.backend == 'true' ||
      needs.changes.outputs.frontend == 'true' ||
      needs.changes.outputs.store == 'true' ||
      needs.changes.outputs.tauri == 'true' ||
      needs.changes.outputs.ci == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: latest
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          uv sync --frozen --group dev
          cd frontend && npm ci

      - name: Run pre-commit
        run: uv run --group dev pre-commit run -a --hook-stage manual
