name: Docker Images

on:
  push:
    branches: [main, master]
    tags: [v*]
    paths:
      - 'Dockerfile'
      - 'docker-compose.yml'
      - '.dockerignore'
      - 'backend/**'
      - 'store/**'
      - 'frontend/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '_dashboard.yaml'
      - 'static/**'
      - 'templates/error/**'
      - '.github/workflows/docker.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'Dockerfile'
      - 'docker-compose.yml'
      - '.dockerignore'
      - 'backend/**'
      - 'store/**'
      - 'frontend/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '_dashboard.yaml'
      - 'static/**'
      - 'templates/error/**'
      - '.github/workflows/docker.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  changes:
    name: Detect Docker Build Targets
    runs-on: ubuntu-latest
    outputs:
      backend_image: ${{ steps.filter.outputs.backend_image }}
      store_image: ${{ steps.filter.outputs.store_image }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect path changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend_image:
              - 'Dockerfile'
              - 'docker-compose.yml'
              - '.dockerignore'
              - 'backend/**'
              - 'frontend/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - '_dashboard.yaml'
              - 'static/**'
              - 'templates/error/**'
            store_image:
              - 'Dockerfile'
              - 'docker-compose.yml'
              - '.dockerignore'
              - 'store/**'
              - 'pyproject.toml'
              - 'uv.lock'

  backend-image:
    name: Build backend image
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend_image == 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (backend)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}-backend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: backend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          build-args: |
            PYTHON_VERSION=3.11-slim
            NODE_VERSION=20-alpine

  store-image:
    name: Build store image
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.store_image == 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (store)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}-store
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Build and push store image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: store
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          build-args: |
            PYTHON_VERSION=3.11-slim
