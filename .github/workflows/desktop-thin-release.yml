name: Desktop Thin Release

on:
  push:
    branches: [main, master]
    tags: [v*]
    paths:
      - 'tauri/**'
      - 'frontend/**'
      - 'scripts/**'
      - '_dashboard.yaml'
      - 'dashboard.yaml'
      - '.github/workflows/desktop-thin-release.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'tauri/**'
      - 'frontend/**'
      - 'scripts/**'
      - '_dashboard.yaml'
      - 'dashboard.yaml'
      - '.github/workflows/desktop-thin-release.yml'
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  build-thin:
    name: Build thin client (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            artifact_name: tauri-thin-macos
          - os: ubuntu-22.04
            artifact_name: tauri-thin-linux
          - os: windows-latest
            artifact_name: tauri-thin-windows

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: tauri

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build thin Tauri release bundle
        env:
          OKO_DESKTOP_DISABLE_PLATFORM_LOCK: 'true'
        working-directory: frontend
        run: npm run tauri:build:thin

      - name: Upload thin bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: tauri/target/release/bundle/**
          if-no-files-found: error
          retention-days: 14
